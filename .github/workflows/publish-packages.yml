name: Publish Packages

# Publishable package:
#   soma-heart  — the trust machine (heart + sensorium + MCP)
#
# soma-sense is intentionally NOT published by this workflow. As of
# soma-heart@0.3.0 the sensorium code lives inside soma-heart as the
# `soma-heart/sense` subpath export, and soma-sense is documented in
# README.md and CHANGELOG.md as superseded / receiving no further
# releases. Re-publishing it here would either halfway-publish the run
# (if the version is unchanged on the registry) or contradict the
# deprecation stance. If the soma-sense package is ever revived, add
# a fresh publish step in a follow-up PR — do not re-attach it here.
#
# Two ways to ship a release:
#
# 1. Tag-triggered (preferred, automated):
#    Push a tag of the form `soma-heart-v0.3.0`. The workflow refuses to
#    run if the tag version doesn't match the `packages/soma-heart/package.json`
#    version — this catches "forgot to bump" mistakes before anything hits npm.
#
# 2. Manual dispatch (fallback):
#    Run "Publish Packages" from the Actions tab. No version check —
#    you're on your own. Used for republishing a broken tag or
#    publishing from a non-tag commit in a pinch.
#
# Both paths gate on the current release suite (lint, typecheck, test,
# build) before calling `npm publish`. Provenance attestations are
# generated automatically because soma-heart has `publishConfig.provenance = true`;
# that requires trusted publishing to be configured on npmjs.com for
# the package. See docs/secure-release-workflow.md.

on:
  push:
    tags:
      - 'soma-heart-v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: soma-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-release
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: pnpm/action-setup@4f4305e1fe60ad818b8ae6fc4a697cc47eab0b2d # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build packages
        run: pnpm run build:packages

      # ─── Version guard ────────────────────────────────────────────────────
      #
      # On tag push, assert the tag version matches the package.json
      # version. Prevents "pushed soma-heart-v0.3.0 but package.json still
      # says 0.2.0" from shipping the wrong artifact.
      - name: Verify tag matches package.json
        if: github.event_name == 'push'
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if [[ "$tag" != soma-heart-v* ]]; then
            echo "Unknown tag format: $tag" >&2
            exit 1
          fi
          tag_v="${tag#soma-heart-v}"
          pkg_v=$(node -p "require('./packages/soma-heart/package.json').version")
          if [[ "$tag_v" != "$pkg_v" ]]; then
            echo "Tag version ($tag_v) does not match package.json version ($pkg_v)." >&2
            echo "Bump package.json and retag before publishing." >&2
            exit 1
          fi

      - name: Publish soma-heart
        working-directory: packages/soma-heart
        run: npm publish
