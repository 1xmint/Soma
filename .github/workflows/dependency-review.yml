name: Dependency Review

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
